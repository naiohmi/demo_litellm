services:
  postgres_litellm:
    image: postgres:15
    container_name: postgres_litellm
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
    volumes:
      - litellm_postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    networks:
      - litellm-net

  litellm:
    image: ghcr.io/berriai/litellm-database:main-latest
    container_name: litellm
    restart: always
    ports:
      - "4000:4000"
    volumes:
      - ./config.yaml:/app/config.yaml
      - ./.env:/app/.env
    env_file:
      - .env
    command: --config /app/config.yaml
    depends_on:
      - qdrant
      - postgres_litellm
      - ollama
    networks:
      - litellm-net

  qdrant:
    image: qdrant/qdrant
    container_name: qdrant
    restart: always
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - litellm-net

  ollama:
    image: ollama/ollama
    container_name: ollama
    restart: always
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - litellm-net

volumes:
  litellm_postgres_data:
  qdrant_data:
  ollama_data:

networks:
  litellm-net:
    driver: bridge